services:
  postgres:
    image: postgres:16-alpine
    container_name: pulseledger-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: pulseledger
      POSTGRES_USER: pulseledger
      POSTGRES_PASSWORD: pulseledger
      TZ: ${TZ:-Asia/Phnom_Penh}
      PGTZ: ${PGTZ:-Asia/Phnom_Penh}
    ports:
      - "5555:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-pulseledger} -d ${POSTGRES_DB:-pulseledger}",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  postgres_data:
